<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VYUHA · SOS Emergency</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080f;--bg2:#0a0d18;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.06);--red:#ff3b55;--green:#00e5a0;--blue:#3ecfff;--yellow:#f5c842;--text:#e8eeff;--muted:rgba(232,238,255,.45)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}
html,body{min-height:100vh}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;width:600px;height:600px;background:rgba(255,59,85,.07);border-radius:50%;filter:blur(130px);top:-200px;right:-150px;z-index:0;pointer-events:none}

.topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;z-index:100;background:rgba(6,8,15,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.top-brand{font-size:1.1rem;font-weight:700;letter-spacing:.2em;color:#c8a96e;text-decoration:none}
.top-tag{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--red);padding:.22rem .7rem;border-radius:20px;background:rgba(255,59,85,.1);border:1px solid rgba(255,59,85,.2)}
.top-status{display:flex;align-items:center;gap:.6rem;padding:.35rem .9rem;border-radius:20px;background:var(--surface);border:1px solid var(--border)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .3s}
.status-dot.on{background:var(--green)}
#statusTxt{font-size:.72rem;font-family:'DM Mono',monospace;color:var(--muted)}
.back-btn{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:.32rem .8rem;border-radius:6px;border:1px solid var(--border);transition:all .25s}
.back-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

main{padding-top:90px;padding-bottom:60px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;min-height:100vh}

h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:700;text-align:center;margin-bottom:.5rem;background:linear-gradient(135deg,#fff,#ff6b7d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:1.5rem}
.page-sub{font-size:.88rem;color:var(--muted);text-align:center;margin-bottom:2.5rem;letter-spacing:.04em}

.sos-area{position:relative;width:260px;height:260px;display:flex;align-items:center;justify-content:center;margin-bottom:2.5rem}
.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(255,59,85,.2);animation:ripple 2.8s ease-out infinite}
.ring:nth-child(1){width:230px;height:230px;animation-delay:0s}
.ring:nth-child(2){width:210px;height:210px;animation-delay:.9s}
.ring:nth-child(3){width:190px;height:190px;animation-delay:1.8s}
@keyframes ripple{0%{transform:scale(.6);opacity:.9}100%{transform:scale(1.6);opacity:0}}
.sos-btn{width:158px;height:158px;border-radius:50%;border:none;background:radial-gradient(circle at 35% 35%,#ff6b7d,var(--red) 70%);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;letter-spacing:.1em;cursor:pointer;z-index:10;transition:all .3s;box-shadow:0 0 40px rgba(255,59,85,.4),0 0 80px rgba(255,59,85,.18),inset 0 0 20px rgba(255,255,255,.1)}
.sos-btn:hover{transform:scale(1.06);box-shadow:0 0 60px rgba(255,59,85,.6),0 0 120px rgba(255,59,85,.25)}
.sos-btn:active{transform:scale(.94)}

.panels{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;width:90%;max-width:960px;margin-bottom:1.2rem}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;backdrop-filter:blur(12px)}
.panel-label{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;font-family:'DM Mono',monospace}
.panel-val{font-size:1.3rem;font-weight:700}
.green{color:var(--green)}.red{color:var(--red)}.blue{color:var(--blue)}.yellow{color:var(--yellow)}
.mono{font-family:'DM Mono',monospace;font-size:.88rem;color:var(--muted)}

.broadcast{width:90%;max-width:960px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.4rem;text-align:center;margin-bottom:1.2rem;backdrop-filter:blur(12px)}
#broadcastTxt{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--muted);line-height:1.7}
#broadcastTxt.active{color:var(--red);animation:blink .9s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

.feed-wrap{width:90%;max-width:960px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;backdrop-filter:blur(12px);margin-bottom:1.2rem}
.feed-hdr{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
.feed-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:fdot 1s infinite}
@keyframes fdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.feed-title{font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
#feedContainer{max-height:200px;overflow-y:auto;font-size:.8rem;color:var(--muted);font-family:'DM Mono',monospace}
.fi{border-bottom:1px solid var(--border);padding:.7rem 0}
.fi:last-child{border-bottom:none}
.fi-head{color:var(--red);font-weight:500;font-size:.76rem;margin-bottom:.3rem}
.fi-loc{color:var(--blue);font-size:.7rem;margin-bottom:.4rem}
.fi-btns{display:flex;gap:.4rem}
.fi-btn{padding:.28rem .75rem;border-radius:5px;font-size:.62rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border:1px solid;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.help{background:rgba(0,229,160,.08);border-color:rgba(0,229,160,.25);color:var(--green)}
.help:hover{background:rgba(0,229,160,.18)}
.resolve{background:rgba(255,59,85,.08);border-color:rgba(255,59,85,.25);color:var(--red)}
.resolve:hover{background:rgba(255,59,85,.18)}

.map-wrap{width:90%;max-width:960px;border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:0 0 40px rgba(0,0,0,.3)}
#map{width:100%;height:420px}
.leaflet-popup-content-wrapper{background:#0a0d18!important;color:var(--text)!important;border-radius:10px;border:1px solid rgba(255,59,85,.2)}
.leaflet-popup-content{color:var(--text)!important;font-size:.8rem;line-height:1.6;font-family:'Space Grotesk',sans-serif}
.leaflet-popup-tip{background:#0a0d18!important}

@media(max-width:600px){.panels{grid-template-columns:1fr 1fr}.topbar{padding:.8rem 1rem}}
</style>
</head>
<body>
<header class="topbar">
  <a class="top-brand"  href="/">VYUHA</a>
  <span class="top-tag">SOS Emergency</span>
  <div class="top-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusTxt">Connecting…</span>
  </div>
  <a class="back-btn"  href="/">← Back</a>
</header>

<main>
  <h1>Emergency SOS</h1>
  <p class="page-sub">Press to broadcast your location to all active responders</p>

  <div class="sos-area">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <button class="sos-btn" id="sosBtn" onclick="triggerSOS()">SOS</button>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-label">Risk Level</div>
      <div class="panel-val green" id="riskLevel">LOW</div>
    </div>
    <div class="panel">
      <div class="panel-label">Active SOS</div>
      <div class="panel-val blue" id="sosCount">0</div>
    </div>
    <div class="panel">
      <div class="panel-label">Your Location</div>
      <div class="panel-val mono" id="coordDisplay">Locating…</div>
    </div>
  </div>

  <div class="broadcast">
    <p id="broadcastTxt">Awaiting emergency — press SOS to broadcast your location</p>
  </div>

  <div class="feed-wrap">
    <div class="feed-hdr">
      <div class="feed-dot"></div>
      <div class="feed-title">Live Crisis Feed</div>
    </div>
    <div id="feedContainer">No active SOS signals detected.</div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
  </div>
</main>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const ORIGIN = window.location.origin;
const socket = io(ORIGIN, { transports: ['websocket', 'polling'] });
let map, sosMarkers = {}, disasterZones = [], myLat, myLng;

const $dot = document.getElementById('statusDot');
const $txt = document.getElementById('statusTxt');
const $risk = document.getElementById('riskLevel');
const $count = document.getElementById('sosCount');
const $coord = document.getElementById('coordDisplay');
const $bcast = document.getElementById('broadcastTxt');
const $feed = document.getElementById('feedContainer');

socket.on('connect', () => {
  $dot.classList.add('on');
  $txt.textContent = 'Connected · ' + socket.id.slice(0,8);
});
socket.on('disconnect', () => {
  $dot.classList.remove('on');
  $txt.textContent = 'Disconnected';
});

map = L.map('map').setView([20.59, 78.96], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

async function loadDisasters() {
  try {
    const r = await fetch(ORIGIN + '/api/disasters');
    if (!r.ok) return;
    const data = await r.json();
    disasterZones = [];
    const colors = { earthquake: '#f5c842', tsunami: '#3ecfff', 'severe weather': '#00e5a0' };
    data.forEach(d => {
      const c = colors[d.type] || '#aaa';
      disasterZones.push({ ...d.coordinates, radius: d.radius });
      L.circle([d.coordinates.lat, d.coordinates.lng], { radius: d.radius, color: c, fillColor: c, fillOpacity: .08, weight: 1 }).addTo(map)
        .bindPopup(`<b>${d.type.toUpperCase()}</b><br>${d.title}<br>Magnitude: ${d.magnitude?.toFixed?.(1) ?? d.magnitude}`);
      L.circleMarker([d.coordinates.lat, d.coordinates.lng], { radius: 6, color: c, fillColor: c, fillOpacity: .9, weight: 2 }).addTo(map);
    });
  } catch {}
}
loadDisasters();

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  return R*2*Math.atan2(Math.sqrt(Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2),Math.sqrt(1-Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2));
}

function calcRisk(lat, lng) {
  for (const z of disasterZones) {
    if (Math.abs(lat - z.lat) < 2 && Math.abs(lng - z.lng) < 2) return 'HIGH';
  }
  return 'LOW';
}

function setRisk(r) {
  $risk.textContent = r;
  $risk.className = 'panel-val ' + (r === 'HIGH' ? 'red' : r === 'MEDIUM' ? 'yellow' : 'green');
}

function addFeedItem(d) {
  if ($feed.textContent.includes('No active')) $feed.innerHTML = '';
  if (document.getElementById('fi-' + d.id)) return;
  const el = document.createElement('div');
  el.className = 'fi'; el.id = 'fi-' + d.id;
  el.innerHTML = `<div class="fi-head">🚨 SOS · ${d.disasterType || 'Emergency'}</div><div class="fi-loc">📍 ${d.lat?.toFixed(4)}, ${d.lng?.toFixed(4)} · ${d.assessment || 'Unknown risk'}</div><div class="fi-btns"><button class="fi-btn help" onclick="acceptHelp('${d.id}')">✓ Help</button><button class="fi-btn resolve" onclick="resolveSOS('${d.id}')">✕ Resolved</button></div>`;
  $feed.appendChild(el);
  $count.textContent = document.querySelectorAll('.fi').length;
}

function addSOSMarker(d) {
  if (sosMarkers[d.id] || !d.lat) return;
  sosMarkers[d.id] = L.circleMarker([d.lat, d.lng], { radius: 10, color: '#ff3b55', fillColor: '#ff3b55', fillOpacity: .85, weight: 2 })
    .addTo(map).bindPopup(`<b>🚨 SOS</b><br>${d.assessment || ''}`);
}

function triggerSOS() {
  if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
  const btn = document.getElementById('sosBtn');
  btn.style.transform = 'scale(.93)';
  setTimeout(() => btn.style.transform = '', 300);
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude;
    const risk = calcRisk(lat, lng);
    const data = { id: Date.now(), lat, lng, disasterType: 'Emergency', assessment: risk + ' RISK' };
    socket.emit('send-sos', data);
    addSOSMarker(data); addFeedItem(data);
    map.setView([lat, lng], 12);
    $coord.textContent = lat.toFixed(4) + ', ' + lng.toFixed(4);
    setRisk(risk);
    $bcast.textContent = '🚨 BROADCASTING — ' + lat.toFixed(4) + ', ' + lng.toFixed(4) + ' · ' + risk;
    $bcast.classList.add('active');
  }, err => alert('Location error: ' + err.message), { enableHighAccuracy: true, timeout: 10000 });
}

socket.on('receive-sos', d => { addSOSMarker(d); addFeedItem(d); });
socket.on('active-sos', list => { list.forEach(d => { addSOSMarker(d); addFeedItem(d); }); $count.textContent = list.length; });
socket.on('sos-resolved', id => {
  if (sosMarkers[id]) { map.removeLayer(sosMarkers[id]); delete sosMarkers[id]; }
  document.getElementById('fi-' + id)?.remove();
  $count.textContent = document.querySelectorAll('.fi').length;
  if (!document.querySelector('.fi')) $feed.textContent = 'No active SOS signals detected.';
});

function acceptHelp(id) { socket.emit('help-accepted', { id, helper: 'Nearby User' }); }
function resolveSOS(id) { socket.emit('resolve-sos', id); }

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    myLat = pos.coords.latitude; myLng = pos.coords.longitude;
    $coord.textContent = myLat.toFixed(4) + ', ' + myLng.toFixed(4);
    map.setView([myLat, myLng], 8);
    L.circleMarker([myLat, myLng], { radius: 8, color: '#00e5a0', fillColor: '#00e5a0', fillOpacity: .9, weight: 2 })
      .addTo(map).bindPopup('<b>📍 You</b>');
    setTimeout(() => { if (disasterZones.length) setRisk(calcRisk(myLat, myLng)); }, 2000);
  }, () => {}, { timeout: 8000 });
}
</script>
</body>
</html>
