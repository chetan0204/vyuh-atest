<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VYUHA · Resources & Shelters</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060810;--bg2:#090c16;--surface:rgba(255,255,255,.04);--border:rgba(0,229,176,.1);--accent:#00e5b0;--red:#ff3b55;--blue:#3ecfff;--yellow:#f5c842;--purple:#b47fff;--text:#e8eeff;--muted:rgba(232,238,255,.45)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
html,body{height:100%;font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

.topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;z-index:1000;background:rgba(6,8,16,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.top-brand{font-size:1.1rem;font-weight:700;letter-spacing:.2em;color:#c8a96e;text-decoration:none}
.top-tag{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);padding:.22rem .7rem;border-radius:20px;background:rgba(0,229,176,.1);border:1px solid rgba(0,229,176,.2)}
.back-btn{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:.32rem .8rem;border-radius:6px;border:1px solid var(--border);transition:all .25s}
.back-btn:hover{color:var(--text);border-color:rgba(0,229,176,.3)}

.layout{display:flex;height:100vh;padding-top:62px}
.sidebar{width:290px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:1.1rem;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:.92rem;font-weight:700;margin-bottom:.8rem}
.filters{display:flex;flex-wrap:wrap;gap:.4rem}
.filter-btn{padding:.28rem .65rem;border-radius:6px;font-size:.62rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;font-family:'Space Grotesk',sans-serif}
.filter-btn.active,.filter-btn:hover{background:var(--accent);color:#060810;border-color:var(--accent)}
.res-list{flex:1;overflow-y:auto;padding:.7rem}
.res-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.85rem 1rem;margin-bottom:.5rem;cursor:pointer;transition:all .2s}
.res-card:hover{border-color:var(--accent);background:rgba(0,229,176,.05)}
.res-type{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.25rem}
.res-name{font-size:.86rem;font-weight:600;margin-bottom:.3rem}
.res-dist{font-size:.7rem;color:var(--muted)}
.res-cap{display:inline-block;margin-top:.35rem;font-size:.62rem;padding:.15rem .5rem;border-radius:10px}
.cap-ok{background:rgba(0,229,176,.1);color:var(--accent);border:1px solid rgba(0,229,176,.2)}
.cap-full{background:rgba(255,59,85,.1);color:var(--red);border:1px solid rgba(255,59,85,.2)}

#map{flex:1}
.leaflet-popup-content-wrapper{background:#090c16!important;color:var(--text)!important;border-radius:10px;border:1px solid rgba(0,229,176,.2)}
.leaflet-popup-content{color:var(--text)!important;font-size:.8rem;line-height:1.6;font-family:'Space Grotesk',sans-serif}
.leaflet-popup-tip{background:#090c16!important}

@media(max-width:700px){.sidebar{width:100%;height:230px;border-right:none;border-bottom:1px solid var(--border);overflow:unset}.layout{flex-direction:column}.res-list{display:flex;flex-direction:row;gap:.5rem;padding:.7rem;overflow-x:auto;overflow-y:hidden}.res-card{min-width:180px;flex-shrink:0}}
</style>
</head>
<body>
<header class="topbar">
  <a class="top-brand"  href="/">VYUHA</a>
  <span class="top-tag">📦 Resources</span>
  <a class="back-btn"  href="/">← Back</a>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">Relief Centers Near You</div>
      <div class="filters">
        <button class="filter-btn active" data-filter="all" onclick="filterRes('all',this)">All</button>
        <button class="filter-btn" data-filter="shelter" onclick="filterRes('shelter',this)">Shelters</button>
        <button class="filter-btn" data-filter="medical" onclick="filterRes('medical',this)">Medical</button>
        <button class="filter-btn" data-filter="food" onclick="filterRes('food',this)">Food</button>
        <button class="filter-btn" data-filter="water" onclick="filterRes('water',this)">Water</button>
      </div>
    </div>
    <div class="res-list" id="resList"><div style="padding:.8rem;font-size:.78rem;color:var(--muted)">Loading resources…</div></div>
  </aside>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let map, allData = [], markers = [], userLat = 20.5937, userLng = 78.9629, curFilter = 'all';

map = L.map('map').setView([userLat, userLng], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

const typeColors = { shelter: '#00e5b0', medical: '#3ecfff', food: '#f5c842', water: '#b47fff' };
function getColor(t) { return typeColors[t] || '#aaa'; }

function dist(a, b, c, d) {
  const R = 6371, dLat = (c-a)*Math.PI/180, dLon = (d-b)*Math.PI/180;
  const x = Math.sin(dLat/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function renderList(data) {
  const el = document.getElementById('resList');
  if (!data.length) { el.innerHTML = '<div style="padding:.8rem;font-size:.78rem;color:var(--muted)">No resources found.</div>'; return; }
  el.innerHTML = data.map(r => {
    const d = dist(userLat, userLng, r.lat, r.lng).toFixed(1);
    return `<div class="res-card" onclick="map.setView([${r.lat},${r.lng}],14)">
      <div class="res-type">${r.type}</div>
      <div class="res-name">${r.name}</div>
      <div class="res-dist">📍 ${d} km away</div>
      <span class="res-cap ${r.capacity > 0 ? 'cap-ok' : 'cap-full'}">${r.capacity > 0 ? r.capacity + ' spots' : 'Full'}</span>
    </div>`;
  }).join('');
}

function renderMarkers(data) {
  markers.forEach(m => map.removeLayer(m)); markers = [];
  data.forEach(r => {
    const c = getColor(r.type);
    const m = L.circleMarker([r.lat, r.lng], { radius: 9, color: c, fillColor: c, fillOpacity: .85, weight: 2 })
      .addTo(map)
      .bindPopup(`<b>${r.name}</b><br>Type: ${r.type}<br>Capacity: ${r.capacity > 0 ? r.capacity + ' spots' : 'Full'}<br>${r.contact || ''}`);
    markers.push(m);
  });
}

window.filterRes = (type, btn) => {
  curFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = type === 'all' ? allData : allData.filter(r => r.type === type);
  renderList(filtered);
  renderMarkers(filtered);
};

function loadData(data) {
  allData = data.map(r => ({ ...r, _d: dist(userLat, userLng, r.lat, r.lng) })).sort((a, b) => a._d - b._d);
  filterRes(curFilter, document.querySelector('.filter-btn.active'));
}

fetch('./data.json')
  .then(r => r.json())
  .then(loadData)
  .catch(() => loadData([
    { name: 'City Relief Shelter A', type: 'shelter', lat: 20.6, lng: 78.9, capacity: 120, contact: '1800-XXX-001' },
    { name: 'Red Cross Medical Unit', type: 'medical', lat: 20.65, lng: 79.0, capacity: 30, contact: '1800-XXX-002' },
    { name: 'Community Food Bank', type: 'food', lat: 20.55, lng: 78.95, capacity: 500, contact: '1800-XXX-003' },
    { name: 'Water Distribution Point', type: 'water', lat: 20.58, lng: 79.1, capacity: 1000, contact: '1800-XXX-004' },
    { name: 'Emergency Shelter B', type: 'shelter', lat: 20.5, lng: 78.8, capacity: 0, contact: '1800-XXX-005' },
    { name: 'District Hospital', type: 'medical', lat: 20.7, lng: 79.05, capacity: 80, contact: '1800-XXX-006' },
  ]));

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude; userLng = pos.coords.longitude;
    map.setView([userLat, userLng], 10);
    L.circleMarker([userLat, userLng], { radius: 9, color: '#fff', fillColor: '#fff', fillOpacity: .9, weight: 2 })
      .addTo(map).bindPopup('<b>📍 You are here</b>');
    if (allData.length) {
      allData = allData.map(r => ({ ...r, _d: dist(userLat, userLng, r.lat, r.lng) })).sort((a, b) => a._d - b._d);
      renderList(curFilter === 'all' ? allData : allData.filter(r => r.type === curFilter));
    }
  }, () => {}, { timeout: 8000 });
}
</script>
</body>
</html>
